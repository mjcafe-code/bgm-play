<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Background Music Player</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 40px;
    background: transparent; /* 투명 배경 */
  }
  #playBtn {
    background: none;
    border: none;
    font-size: 28px;
    cursor: pointer;
    transition: transform 0.3s ease;
    vertical-align: middle;
  }
  #playBtn:hover {
    transform: scale(1.2);
  }
  #label {
    font-size: 16px;
    color: #d6336c;
    margin-left: 8px;
    vertical-align: middle;
  }
  .control {
    margin-top: 15px;
    font-size: 14px;
    color: #333;
  }
  #trackTitle {
    font-size: 15px;
    font-weight: bold;
    color: #444;
    margin-bottom: 10px;
  }
</style>
</head>
<body>
<!-- 연주자 이미지 -->
<div style="margin-bottom:20px;">
  <img src="violin-girl.png" alt="바이올린 연주자" 
       style="width:180px; display:block; margin:0 auto;">
</div>

<!-- 곡 제목 표시 -->
<div id="trackTitle" 
     style="font-size:16px; font-weight:bold; color:#000; margin-bottom:10px !important;">
  🎼 Luigi Boccherini - Minuetto
</div>


<!-- 오디오 -->
<audio id="bgm" loop>
  <source src="Luigi_Boccherini-Minuetto.m4a" type="audio/mp4">
  <source src="Luigi_Boccherini-Minuetto.mp3" type="audio/mpeg">
</audio>

<!-- 벚꽃 버튼 + 텍스트 -->
<button id="playBtn">🌸</button>
<span id="label">Play Background Music</span>

<!-- 볼륨 슬라이더 -->
<div class="control">
  🔊 볼륨:
  <input type="range" id="volumeControl" min="0" max="1" step="0.1" value="0.5">
</div>

<!-- 시크바 -->
<div class="control">
  ⏱️ 재생 위치:
  <input type="range" id="seekBar" min="0" max="100" step="1" value="0">
</div>

<script>
const bgm = document.getElementById("bgm");
const playBtn = document.getElementById("playBtn");
const label = document.getElementById("label");
const volumeControl = document.getElementById("volumeControl");
const seekBar = document.getElementById("seekBar");

// 버튼 클릭 → 재생/일시정지 토글
playBtn.addEventListener("click", () => {
  if (bgm.paused) {
    bgm.play().then(() => {
      label.textContent = "Pause Music";
      playBtn.textContent = "🎵";
    }).catch(err => {
      console.error("재생 실패:", err);
    });
  } else {
    bgm.pause();
    label.textContent = "Play Background Music";
    playBtn.textContent = "🌸";
  }
});

// 볼륨 조절
volumeControl.addEventListener("input", () => {
  bgm.volume = volumeControl.value;
});

// 시크바 업데이트 (재생 중 위치 반영)
bgm.addEventListener("timeupdate", () => {
  const progress = (bgm.currentTime / bgm.duration) * 100;
  seekBar.value = progress;
});

// 시크바 이동 → 재생 위치 변경
seekBar.addEventListener("input", () => {
  const newTime = (seekBar.value / 100) * bgm.duration;
  bgm.currentTime = newTime;
});
</script>

</body>
</html>
