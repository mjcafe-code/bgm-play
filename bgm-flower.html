<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Background Music Player</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 40px;
    background-color: #fffafc;
  }
  #playBtn {
    background: none;
    border: none;
    font-size: 28px;
    cursor: pointer;
    transition: transform 0.3s ease;
    vertical-align: middle;
  }
  #playBtn:hover {
    transform: scale(1.2);
  }
  #label {
    font-size: 16px;
    color: #d6336c;
    margin-left: 8px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<!-- 오디오 -->
<audio id="bgm" loop>
  <source src="Luigi_Boccherini-Minuetto.m4a" type="audio/mpeg">
</audio>

<!-- 벚꽃 버튼 + 텍스트 -->
<button id="playBtn">🌸</button>
<span id="label">Play Background Music</span>

<script>
const bgm = document.getElementById("bgm");
const playBtn = document.getElementById("playBtn");
const label = document.getElementById("label");

// 버튼 클릭 → 재생/일시정지
playBtn.addEventListener("click", () => {
  if (bgm.paused) {
    bgm.play();
    label.textContent = "Pause Music";
    playBtn.textContent = "🎵"; // 재생 중 아이콘
  } else {
    bgm.pause();
    label.textContent = "Play Background Music";
    playBtn.textContent = "🌸"; // 정지 시 아이콘
  }
});
</script>

</body>
</html>
