<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGM Player</title>

<!--
  ════════════════════════════════════════════════════════════
  MJ BGM Player — Cafe Style Version
  작성: Hanrim (Cozy Shelter)

  [사용법]
  아래 형식으로 iframe src에 파라미터를 넣어주세요.
  bgm-player_cafe-ver.html?data=음악파일|곡제목|이미지파일

  예시:
  ?data=The_Swan.m4a|The Swan / Yo-Yo Ma|new_violin-girl.png

  [파라미터 설명]
  · 1번째 : 음악 파일명 또는 전체 URL (필수)
  · 2번째 : 곡 제목 — " / "로 구분하면 두 줄 표시 (선택)
  · 3번째 : 이미지 파일명 또는 전체 URL (선택, 기본값: violin-girl.png)

  [티스토리 게시글 삽입 코드]
  아래 코드를 게시글 HTML 모드에 붙여넣으세요.

  <div id="bgm-wrap" style="position:sticky; top:20px; float:right; width:220px; margin-left:16px;">
    <iframe id="bgm-iframe"
      src="https://mercihanrim.github.io/bgm-play/bgm-player_cafe-ver.html?data=파일명|곡제목|이미지"
      width="220" height="450" frameborder="0" scrolling="no">
    </iframe>
  </div>
  <script>
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'bgm-resize') {
      document.getElementById('bgm-iframe').style.height = e.data.height + 'px';
    }
  });
  </script>

  [접기/펼치기]
  플레이어 우측 상단 ∨/∧ 버튼으로 접고 펼칩니다.
  접힌 상태에서도 음악은 계속 재생됩니다.

  [sticky 동작]
  삽입 코드의 position:sticky 덕분에 스크롤해도 플레이어가
  화면 상단에 고정되어 따라옵니다.

  [skin.html 연동 — postMessage]
  재생/정지 시 부모 페이지(skin.html)에 아래 메시지를 전송합니다.
  · 재생 시: { type: 'cafe-bgm-play' }
  · 정지 시: { type: 'cafe-bgm-pause' }
  skin.html에서 이 메시지를 수신하면 MJ Player v1.0이 자동으로 일시정지됩니다.
  (cozy-drift_skin_v4.html 이상 버전에서 지원)
  ════════════════════════════════════════════════════════════
-->

<!-- Google Fonts: 제목용 세리프체 + 라벨용 산세리프체 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">

<style>
  /* 모든 요소에 box-sizing 적용 — 레이아웃 계산 오류 방지 */
  *, *::before, *::after { box-sizing: border-box; }

  /* ──────────────────────────────────
     디자인 색상 변수
     카페 감성의 크림/브라운 계열 팔레트
  ────────────────────────────────── */
  :root {
    --cream:    #faf6f0;  /* 배경 크림색 */
    --coffee:   #6b4226;  /* 버튼·강조 브라운 */
    --espresso: #3b1f0e;  /* 텍스트 다크 브라운 */
    --latte:    #c4956a;  /* 라벨·보조 골드 브라운 */
    --mist:     #e8ddd0;  /* 구분선·슬라이더 베이지 */
    --shadow:   rgba(59, 31, 14, 0.12); /* 그림자 */
  }

  /* body — iframe 내부 기본 설정 */
  body {
    font-family: 'Lato', sans-serif;
    margin: 0;
    padding: 0;
    background: transparent;
    color: var(--espresso);
    overflow: hidden;
    position: relative; /* collapseBtn absolute 기준점 */
  }

  /* 플레이어 전체 래퍼 — collapseBtn absolute 기준점 */
  #player-wrapper {
    position: relative;
  }

  /* 접기/펼치기 토글 버튼
     우측 상단 고정 위치
  ══════════════════════════════════ */
  #collapseBtn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--mist);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--latte);
    transition: background 0.2s;
    z-index: 10;
  }
  #collapseBtn:hover {
    background: var(--coffee);
    color: var(--cream);
  }

  /* ══════════════════════════════════
     PC 플레이어 — 기본(펼친) 상태
  ══════════════════════════════════ */
  #pc-player {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 12px 12px;
    transition: all 0.3s ease;
  }

  /* ──────────────────────────────────
     접힌 상태 — body.collapsed 클래스가
     추가될 때 적용됩니다.
     JS에서 collapseBtn 클릭 시 토글됩니다.
  ────────────────────────────────── */

  /* 접힌 상태: 가로 레이아웃, 높이 64px로 압축 */
  body.collapsed #pc-player {
    flex-direction: row;
    padding: 0 12px;
    height: 64px;
    gap: 10px;
  }

  /* 접힌 상태에서 숨길 요소들 */
  body.collapsed .pc-img-frame,  /* 앨범 이미지 */
  body.collapsed .pc-divider,    /* 구분선 */
  body.collapsed .pc-ctrl {      /* 볼륨/시크 슬라이더 */
    display: none !important;
  }

  /* 접힌 상태: 곡 제목을 한 줄로 압축 */
  body.collapsed #trackTitle {
    font-size: 12px;
    margin-bottom: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 120px;
    text-align: left;
  }

  /* 접힌 상태: 재생 버튼 행 마진 제거 */
  body.collapsed .pc-play-row {
    margin-bottom: 0;
    flex-shrink: 0;
  }

  /* 접힌 상태: Play/Pause 텍스트 라벨 숨김 */
  body.collapsed #label { display: none; }

  /* ══════════════════════════════════
     앨범 이미지 프레임
     이중 테두리로 빈티지 액자 느낌
  ══════════════════════════════════ */
  .pc-img-frame {
    position: relative;
    width: 180px;
    margin-bottom: 16px;
  }
  /* 안쪽 테두리 */
  .pc-img-frame::before {
    content: '';
    position: absolute;
    inset: -5px;
    border: 1px solid var(--latte);
    border-radius: 4px;
    opacity: 0.5;
  }
  /* 바깥쪽 테두리 */
  .pc-img-frame::after {
    content: '';
    position: absolute;
    inset: -10px;
    border: 1px solid var(--mist);
    border-radius: 6px;
    opacity: 0.4;
  }
  #pc-img {
    width: 180px;
    display: block;
    border-radius: 3px;
    box-shadow: 0 4px 18px var(--shadow);
  }

  /* ══════════════════════════════════
     곡 제목 — Playfair Display 세리프체
  ══════════════════════════════════ */
  #trackTitle {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--espresso);
    letter-spacing: 0.02em;
    line-height: 1.5;
    margin-bottom: 14px;
    text-align: center;
    /* 파라미터에서 " / "로 구분 시 JS가 <br>로 변환해 두 줄 표시 */
  }

  /* ══════════════════════════════════
     재생 버튼 행
  ══════════════════════════════════ */
  .pc-play-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  /* ──────────────────────────────────
     재생/일시정지 버튼
     인라인 SVG 아이콘으로 정중앙 배치합니다.
     JS의 setPlayState()가 playIcon/pauseIcon을 교체합니다.
  ────────────────────────────────── */
  #playBtn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--coffee);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 10px rgba(107, 66, 38, 0.35);
    transition: transform 0.2s, box-shadow 0.2s;
    flex-shrink: 0;
    font-size: 0;      /* 텍스트 내용 숨김 (SVG 아이콘만 표시) */
    position: relative;
  }
  #playBtn:hover {
    transform: scale(1.08);
    box-shadow: 0 4px 16px rgba(107, 66, 38, 0.45);
  }
  #playBtn:active { transform: scale(0.95); }

  /* ::after 비활성화 — SVG 방식으로 전환 후 불필요 */
  #playBtn::after { display: none; }
  #playBtn.playing::after { display: none; }

  /* Play / Pause 텍스트 라벨 */
  #label {
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--latte);
    min-width: 60px; /* 텍스트 길이 변화 시 버튼 위치 흔들림 방지 */
  }

  /* ══════════════════════════════════
     볼륨·시크바 슬라이더 컨트롤
  ══════════════════════════════════ */
  .pc-ctrl {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .ctrl-icon {
    font-size: 13px;
    flex-shrink: 0;
    opacity: 0.6;
  }
  .ctrl-label {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--latte);
    flex-shrink: 0;
    width: 28px;
  }

  /* 슬라이더 기본 스타일 — 브라우저 기본 디자인 제거 후 커스텀 */
  input[type=range] {
    -webkit-appearance: none;
    flex: 1;
    height: 3px;
    background: var(--mist);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  /* 슬라이더 thumb (드래그 핸들) */
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--coffee);
    box-shadow: 0 1px 4px var(--shadow);
    transition: transform 0.15s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }
  /* Firefox용 */
  input[type=range]::-moz-range-thumb {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--coffee);
    border: none;
  }

  /* 제목과 컨트롤 사이 구분선 */
  .pc-divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--mist), transparent);
    margin: 4px 0 12px;
  }

  /* ══════════════════════════════════
     모바일 전용 — body.mobile 클래스로 토글
     JS의 checkMobile()이 window.screen.width를
     기준으로 클래스를 추가/제거합니다.
     (CSS 미디어 쿼리 대신 JS 감지 — iframe 내부
      viewport 오인식 문제 방지)
  ══════════════════════════════════ */

  /* 모바일에서 접기 버튼 숨김 — 모바일은 슬라이드 패널로 대신함 */
  body.mobile #collapseBtn { display: none !important; }

  /* 모바일 요소들: 기본 숨김 */
  #mob-toggle, #mob-panel { display: none; }

  /* ── 플로팅 버튼 (우측 하단 고정) ── */
  body.mobile #mob-toggle {
    display: flex;
    position: fixed;
    bottom: 72px;
    right: 18px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--coffee);
    border: none;
    font-size: 22px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 14px rgba(107, 66, 38, 0.45);
    z-index: 9998;
    transition: transform 0.2s;
    color: var(--cream);
  }
  body.mobile #mob-toggle:active { transform: scale(0.92); }

  /* ── 슬라이드 업 패널 ──
     기본: 화면 아래로 숨김 (translateY 100%)
     .open 클래스 추가 시: 화면에 표시 (translateY 0)
  ── */
  body.mobile #mob-panel {
    display: block;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--cream);
    border-top: 1px solid var(--mist);
    border-radius: 18px 18px 0 0;
    box-shadow: 0 -6px 28px rgba(59, 31, 14, 0.14);
    padding: 12px 20px 28px;
    z-index: 9997;
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(.4, 0, .2, 1);
  }
  body.mobile #mob-panel.open { transform: translateY(0); }

  /* 패널 상단 드래그 핸들 (장식용) */
  #mob-handle {
    width: 32px;
    height: 3px;
    background: var(--mist);
    border-radius: 2px;
    margin: 0 auto 14px;
  }

  /* 패널 내부: 이미지 + 정보 가로 배치 */
  .mob-inner { display: flex; align-items: center; gap: 14px; }

  /* 모바일 앨범 이미지 */
  #mob-img {
    width: 64px;
    height: 64px;
    object-fit: cover;
    border-radius: 6px;
    box-shadow: 0 2px 10px var(--shadow);
    flex-shrink: 0;
  }

  /* 패널 우측 정보 영역 */
  .mob-info { flex: 1; min-width: 0; }
  #mob-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--espresso);
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mob-play-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  #mob-play-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--coffee);
    border: none;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(107, 66, 38, 0.35);
    flex-shrink: 0;
    transition: transform 0.15s;
    color: var(--cream);
  }
  #mob-play-btn:active { transform: scale(0.92); }
  #mob-label {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--latte);
  }
  .mob-ctrl-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .mob-ctrl-row .ctrl-icon { font-size: 11px; }
  .mob-ctrl-row input[type=range] { height: 2px; }
</style>
</head>
<body>

<!-- ════════════════════════════════════
  플레이어 전체 래퍼
  collapseBtn의 position:absolute 기준점
════════════════════════════════════ -->
<div id="player-wrapper">

<!-- 접기/펼치기 버튼 -->
<button id="collapseBtn" aria-label="접기/펼치기">∨</button>

<!-- ════════════════════════════════════
  PC 플레이어
  기본(펼친) 상태에서 표시
  모바일에서는 body.mobile 클래스로 숨김
════════════════════════════════════ -->
<div id="pc-player">

  <!-- 앨범 이미지 (파라미터 3번째 값) -->
  <div class="pc-img-frame">
    <img id="pc-img" src="" alt="">
  </div>

  <!-- 곡 제목 (파라미터 2번째 값, " / "로 줄바꿈) -->
  <div id="trackTitle"></div>

  <!-- 구분선 -->
  <div class="pc-divider"></div>

  <!-- 재생 버튼 + 상태 텍스트 -->
  <div class="pc-play-row">
    <button id="playBtn" aria-label="Play">
      <svg id="playIcon" width="14" height="16" viewBox="0 0 14 16" fill="none">
        <polygon points="1,0 14,8 1,16" fill="#faf6f0"/>
      </svg>
      <svg id="pauseIcon" width="12" height="14" viewBox="0 0 12 14" fill="none" style="display:none;">
        <rect x="0" y="0" width="4" height="14" fill="#faf6f0"/>
        <rect x="8" y="0" width="4" height="14" fill="#faf6f0"/>
      </svg>
    </button>
    <span id="label">Play</span>
  </div>

  <!-- 볼륨 슬라이더 -->
  <div class="pc-ctrl">
    <span class="ctrl-icon">🔊</span>
    <span class="ctrl-label">Vol</span>
    <input type="range" id="volumeControl" min="0" max="1" step="0.05" value="0.5">
  </div>

  <!-- 재생 위치(시크) 슬라이더 -->
  <div class="pc-ctrl">
    <span class="ctrl-icon">⏱</span>
    <span class="ctrl-label">Seek</span>
    <input type="range" id="seekBar" min="0" max="100" step="1" value="0">
  </div>

</div><!-- /#pc-player -->
</div><!-- /#player-wrapper -->

<!-- ════════════════════════════════════
  모바일: 플로팅 버튼
  클릭 시 슬라이드 업 패널 열림/닫힘
════════════════════════════════════ -->
<button id="mob-toggle" aria-label="음악 플레이어 열기">▶</button>

<!-- ════════════════════════════════════
  모바일: 슬라이드 업 패널
  .open 클래스 추가 시 화면에 표시
════════════════════════════════════ -->
<div id="mob-panel">
  <div id="mob-handle"></div>
  <div class="mob-inner">
    <img id="mob-img" src="" alt="">
    <div class="mob-info">
      <div id="mob-title"></div>
      <div class="mob-play-row">
        <button id="mob-play-btn">▶</button>
        <span id="mob-label">Play</span>
      </div>
      <div class="mob-ctrl-row">
        <span class="ctrl-icon">🔊</span>
        <input type="range" id="mob-vol" min="0" max="1" step="0.05" value="0.5">
      </div>
      <div class="mob-ctrl-row">
        <span class="ctrl-icon">⏱</span>
        <input type="range" id="mob-seek" min="0" max="100" step="1" value="0">
      </div>
    </div>
  </div>
</div>

<!-- 오디오 태그 — loop 속성으로 반복 재생 -->
<audio id="bgm" loop></audio>

<script>
/* ════════════════════════════════════════════════════════════
   URL 파라미터 파싱 — | 구분자 방식

   티스토리 에디터가 &를 &amp;로 자동 변환하는 문제를 방지하기 위해
   파라미터를 | 하나로 묶어서 전달합니다.

   사용법:
   bgm-player_cafe-ver.html?data=파일명|곡제목|이미지파일명또는URL

   · 1번째(src)   : 음악 파일명 또는 URL (필수)
   · 2번째(title) : 플레이어에 표시될 곡 제목 (선택, 기본값: "Background Music")
                    " / "를 넣으면 두 줄로 표시됩니다. 예: The Swan / Yo-Yo Ma
   · 3번째(img)   : 이미지 파일명 또는 URL (선택, 기본값: violin-girl.png)
                    PC 플레이어 + 모바일 패널 양쪽에 표시됩니다.

   ※ 파싱 방식:
      URLSearchParams 대신 href에서 직접 슬라이싱합니다.
      %7C(인코딩된 |)를 먼저 복원한 뒤 split → 각 조각 개별 decodeURIComponent.
      이 방식으로 & 인코딩 문제와 공백 처리 문제를 동시에 해결합니다.

   ⚠️ iOS 모바일 주소창에서 직접 URL 입력 시 주의:
      공백이 포함된 URL은 공백 위치에서 잘릴 수 있습니다.
      직접 테스트 시에는 공백을 %20으로 인코딩해주세요.
      예) The Swan → The%20Swan
      티스토리 iframe src에 넣을 때는 그대로 써도 됩니다. (자동 처리됨)
   ════════════════════════════════════════════════════════════ */

/* ── 파라미터 파싱 ── */
var _href  = window.location.href;
var _qi    = _href.indexOf('?data=');
var _raw   = _qi >= 0 ? _href.slice(_qi + 6) : '';
/* %7C(인코딩된 |)를 먼저 복원한 뒤 split → 각 조각 개별 디코딩 */
var parts  = _raw.replace(/%7C/gi, '|').split('|').map(function(s) {
  try { return decodeURIComponent(s).trim(); } catch(e) { return s.trim(); }
});
var srcUrl    = parts[0] || '';
var titleText = parts[1] || 'Background Music';
var imgUrl    = parts[2] || 'violin-girl.png';

/* ── DOM 요소 참조 ── */
var bgm           = document.getElementById('bgm');
var playBtn       = document.getElementById('playBtn');
var label         = document.getElementById('label');
var volumeControl = document.getElementById('volumeControl');
var seekBar       = document.getElementById('seekBar');
var mobToggle     = document.getElementById('mob-toggle');
var mobPanel      = document.getElementById('mob-panel');
var mobPlayBtn    = document.getElementById('mob-play-btn');
var mobLabel      = document.getElementById('mob-label');
var mobVol        = document.getElementById('mob-vol');
var mobSeek       = document.getElementById('mob-seek');
var mobImg        = document.getElementById('mob-img');
var collapseBtn   = document.getElementById('collapseBtn');
var playIcon      = document.getElementById('playIcon');
var pauseIcon     = document.getElementById('pauseIcon');

/* SVG 아이콘 전환 — 재생/일시정지 상태에 따라 교체 */
function setPlayState(playing) {
  playIcon.style.display  = playing ? 'none'  : 'block';
  pauseIcon.style.display = playing ? 'block' : 'none';
  label.textContent       = playing ? 'Pause' : 'Play';
  mobToggle.textContent   = playing ? '⏸' : '▶';
}

/* ── 파라미터 적용 ── */
if (srcUrl) bgm.src = srcUrl;
/* " / " → <br> 변환으로 두 줄 표시 */
document.getElementById('trackTitle').innerHTML = titleText.replace(/\s*\/\s*/g, '<br>');
document.getElementById('mob-title').textContent = titleText;
document.getElementById('pc-img').src = imgUrl;
mobImg.src = imgUrl;

/* ════════════════════════════════════
   접기/펼치기 + postMessage 높이 조절

   [동작 원리]
   1. 접기 버튼 클릭 → body.collapsed 클래스 토글
   2. CSS가 collapsed 상태에 맞게 레이아웃 변경
   3. postMessage로 부모 페이지(티스토리)에 새 높이 전달
   4. 부모 페이지의 수신 스크립트가 iframe height 조절

   [높이 값]
   · 펼친 상태: 450px (이미지 + 제목 + 컨트롤 전체)
   · 접힌 상태:  64px (재생 버튼 + 곡 제목만)
   ════════════════════════════════════ */
var HEIGHT_EXPANDED  = 450; /* 펼친 상태 높이 (px) */
var HEIGHT_COLLAPSED =  64; /* 접힌 상태 높이 (px) */

/* 부모 페이지에 높이 변경 요청 메시지 전송 */
function notifyHeight(h) {
  /* '*' — 모든 origin 허용 (티스토리 도메인 고정 불필요) */
  window.parent.postMessage({ type: 'bgm-resize', height: h }, '*');
}

/* 접기/펼치기 상태 변수 */
var collapsed = false;

collapseBtn.addEventListener('click', function () {
  collapsed = !collapsed;
  /* body에 collapsed 클래스 추가/제거 → CSS가 레이아웃 전환 */
  document.body.classList.toggle('collapsed', collapsed);
  /* 버튼 아이콘 전환: 펼침=∨, 접힘=∧ */
  collapseBtn.textContent = collapsed ? '∧' : '∨';
  /* 부모에게 새 높이 전달 */
  notifyHeight(collapsed ? HEIGHT_COLLAPSED : HEIGHT_EXPANDED);
});

/* 페이지 로드 완료 후 초기 높이를 부모에게 전달
   (DOMContentLoaded 전 호출 시 iframe이 준비 안 된 경우 방지) */
window.addEventListener('load', function() {
  notifyHeight(HEIGHT_EXPANDED);
});

/* ════════════════════════════════════
   모바일 감지

   CSS 미디어 쿼리 대신 JS로 감지하는 이유:
   iframe 내부에서 CSS 미디어 쿼리가 iframe 너비가 아닌
   부모 페이지 viewport를 기준으로 작동하는 오류가 있어
   window.screen.width (기기 실제 화면 너비)로 직접 판별합니다.
   768px 이하 → 모바일, 초과 → PC
   ════════════════════════════════════ */
function checkMobile() {
  if (window.screen.width <= 768) {
    document.body.classList.add('mobile');
  } else {
    document.body.classList.remove('mobile');
    /* PC 전환 시 열려있던 모바일 패널 닫기 */
    panelOpen = false;
    mobPanel.classList.remove('open');
  }
}
checkMobile();
window.addEventListener('resize', checkMobile);

/* ════════════════════════════════════
   PC 재생 컨트롤
   ════════════════════════════════════ */
playBtn.addEventListener('click', function () {
  if (bgm.paused) {
    bgm.play().then(function () {
      setPlayState(true);
      window.parent.postMessage({ type: 'cafe-bgm-play' }, '*');
    }).catch(function (e) { console.error(e); });
  } else {
    bgm.pause();
    setPlayState(false);
    window.parent.postMessage({ type: 'cafe-bgm-pause' }, '*');
  }
});

/* 볼륨 슬라이더 */
volumeControl.addEventListener('input', function () { bgm.volume = this.value; });

/* 시크(재생 위치) 슬라이더 */
seekBar.addEventListener('input', function () {
  if (bgm.duration) bgm.currentTime = (this.value / 100) * bgm.duration;
});

/* ════════════════════════════════════
   모바일 재생 컨트롤
   ════════════════════════════════════ */
var panelOpen = false;

/* 재생 상태에 따라 모바일 버튼 UI 업데이트 */
function setMobPlayState(playing) {
  mobPlayBtn.textContent = playing ? '⏸' : '▶';
  mobLabel.textContent   = playing ? 'Pause' : 'Play';
  mobToggle.textContent  = playing ? '⏸' : '▶';
}

/* 플로팅 버튼 클릭 → 패널 열기/닫기 */
mobToggle.addEventListener('click', function () {
  panelOpen = !panelOpen;
  mobPanel.classList.toggle('open', panelOpen);
});

/* 패널 재생 버튼 */
mobPlayBtn.addEventListener('click', function () {
  if (bgm.paused) {
    bgm.play().then(function () {
      setMobPlayState(true);
      window.parent.postMessage({ type: 'cafe-bgm-play' }, '*');
    }).catch(function (e) { console.error(e); });
  } else {
    bgm.pause();
    setMobPlayState(false);
    window.parent.postMessage({ type: 'cafe-bgm-pause' }, '*');
  }
});

/* 모바일 볼륨/시크 슬라이더 */
mobVol.addEventListener('input', function () { bgm.volume = this.value; });
mobSeek.addEventListener('input', function () {
  if (bgm.duration) bgm.currentTime = (this.value / 100) * bgm.duration;
});

/* ════════════════════════════════════
   공용: 재생 시간 업데이트
   PC와 모바일 시크바를 동시에 업데이트합니다.
   ════════════════════════════════════ */
bgm.addEventListener('timeupdate', function () {
  if (bgm.duration) {
    var pct = (bgm.currentTime / bgm.duration) * 100;
    seekBar.value = pct;
    mobSeek.value = pct;
  }
});

/* ════════════════════════════════════
   모바일 패널 외부 클릭 시 자동 닫기
   패널과 플로팅 버튼 외의 영역 클릭 감지
   ════════════════════════════════════ */
document.addEventListener('click', function (e) {
  if (panelOpen && !mobPanel.contains(e.target) && e.target !== mobToggle) {
    panelOpen = false;
    mobPanel.classList.remove('open');
  }
});
</script>

</body>
</html>
